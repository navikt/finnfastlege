apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: finnfastlege
  namespace: teamsykefravr
  labels:
    team: teamsykefravr
  annotations:
    texas.nais.io/enabled: "true"
spec:
  image: {{ image }}
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 90
  port: 8080
  liveness:
    path: /health/isAlive
    initialDelay: 10
    timeout: 5
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /health/isReady
    initialDelay: 30
    periodSeconds: 5
    timeout: 5
  valkey:
    - instance: cache
      access: readwrite
  env:
      # Must be set to production in dev.
      # See https://expressjs.com/en/advanced/best-practice-performance.html#set-node_env-to-production
    - name: NODE_ENV
      value: production
    - name: DECORATOR_CDN_URL
      value: https://cdn.nav.no/personoversikt/internarbeidsflate-decorator-v3/dev/latest/dist/internarbeidsflate-decorator.wc.js
    - name: FASTLEGEREST_AAD_APP_CLIENT_ID
      value: "dev-gcp.teamsykefravr.fastlegerest"
    - name: SYFOPERSON_AAD_APP_CLIENT_ID
      value: "dev-gcp.teamsykefravr.syfoperson"
    - name: MODIACONTEXTHOLDER_AAD_APP_CLIENT_ID
      value: "dev-gcp.personoversikt.modiacontextholder"
    - name: MODIACONTEXTHOLDER_HOST
      value: "http://modiacontextholder.personoversikt"
    - name: ISTILGANGSKONTROLL_AAD_APP_CLIENT_ID
      value: "dev-gcp.teamsykefravr.istilgangskontroll"
    - name: FASTLEGEREST_HOST
      value: "http://fastlegerest"
    - name: SYFOPERSON_HOST
      value: "http://syfoperson"
    - name: ISTILGANGKONTROLL_HOST
      value: "http://istilgangskontroll"
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 5m
      memory: 128Mi
  accessPolicy:
    outbound:
      external:
        - host: "login.microsoftonline.com"
      rules:
        - application: fastlegerest
        - application: istilgangskontroll
        - application: syfoperson
        - application: modiacontextholder
          namespace: personoversikt
  azure:
    sidecar:
      enabled: true
      autoLogin: true
    application:
      allowAllUsers: true
      enabled: true
      tenant: trygdeetaten.no
      claims:
        extra:
          - "NAVident"
  ingresses:
    - "https://finnfastlege.intern.dev.nav.no"
    - "https://finnfastlege.ansatt.dev.nav.no"
